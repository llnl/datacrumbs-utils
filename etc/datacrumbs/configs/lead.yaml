capture_probes:
  - name: sys
    probe: syscalls
    type: header
    file: /usr/src/kernels/@DATACRUMBS_KERNEL_UNAME_R@/include/linux/syscalls.h
    regex: sys_.*
  - name: os_page_cache
    probe: kprobe
    type: header
    file: /usr/src/kernels/@DATACRUMBS_KERNEL_UNAME_R@/include/linux/pagemap.h
  - name: lustre
    probe: kprobe
    type: binary
    file: /usr/lib/modules/5.14.0-570.55.1.1toss.t5.x86_64/weak-updates/lustre/fs/lustre.ko
    regex: (?!.*__)(?!.*:)(?!.*constprop)(?!.*isra).*
  - name: mdc
    probe: kprobe
    type: binary
    file: /usr/lib/modules/5.14.0-570.55.1.1toss.t5.x86_64/weak-updates/lustre/fs/mdc.ko
    regex: (?!.*__)(?!.*:)(?!.*constprop)(?!.*isra).*
  - name: mgc
    probe: kprobe
    type: binary
    file: /usr/lib/modules/5.14.0-570.55.1.1toss.t5.x86_64/weak-updates/lustre/fs/mgc.ko
    regex: (?!.*__)(?!.*:)(?!.*constprop)(?!.*isra).*
  - name: osc
    probe: kprobe
    type: binary
    file: /usr/lib/modules/5.14.0-570.55.1.1toss.t5.x86_64/weak-updates/lustre/fs/osc.ko
    regex: (?!.*__)(?!.*:)(?!.*constprop)(?!.*isra).*
  - name: ptlrpc
    probe: kprobe
    type: binary
    file: /usr/lib/modules/5.14.0-570.55.1.1toss.t5.x86_64/weak-updates/lustre/fs/ptlrpc.ko
    regex: (?!.*__)(?!.*:)(?!.*constprop)(?!.*isra).*
  - name: mpi
    probe: uprobe
    type: binary
    file: /opt/toss/openmpi/4.1/gnu/lib/libmpi.so
    regex: .*
  - name: ior
    probe: uprobe
    type: binary
    file: /home/haridev/software/ior/install/bin/ior
    regex: .*
  - name: iomap
    probe: kprobe
    type: ksym
    regex: ^iomap(?!.*cold).*
  - name: xfs
    probe: kprobe
    type: ksym
    regex: ^xfs(?!.*cold).*
  - name: libc
    probe: uprobe
    type: binary
    file: @DATACRUMBS_LIBC_SO@
    regex: ^(open|open64|openat|openat64|creat|creat64|close|read|write|pread|pwrite|pread64|pwrite64|readv|writev|preadv|pwritev|preadv64|pwritev64|lseek|lseek64|fsync|fdatasync|sync|mmap|mmap64|munmap|mprotect|msync|madvise|brk|sbrk|mlock|munlock|mlockall|munlockall|posix_madvise|posix_memalign|memalign|aligned_alloc|valloc|pvalloc|malloc|calloc|realloc|free|memcpy|memmove|memset|memcmp|memchr|rawmemchr|memrchr|strcpy|strncpy|strcat|strncat|strcmp|strncmp|strlen|strnlen|strchr|strrchr|strstr|strpbrk|strspn|strcspn|strdup|strndup|fopen|fopen64|freopen|freopen64|fdopen|fclose|fflush|fread|fwrite|fgetc|getc|getchar|fputc|putc|putchar|fgets|fputs|puts|ungetc|getline|getdelim|fseek|ftell|rewind|fseeko|ftello|fgetpos|fsetpos|fileno|feof|ferror|clearerr|setvbuf|setbuf|setbuffer|setlinebuf|fprintf|printf|snprintf|sprintf|vfprintf|vprintf|vsnprintf|vsprintf|scanf|fscanf|sscanf|vscanf|vfscanf|vsscanf)(@@?|$).*
